---
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANSIBLE_DEPRECATION_WARNINGS: "false"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install yamllint ansible-lint ansible

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint
        env:
          ANSIBLE_ROLES_PATH: ".."

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install molecule molecule-plugins[docker] ansible docker

      - name: Run Molecule
        run: molecule test
        env:
          ANSIBLE_ROLES_PATH: ".."
