---
driver:
  name: docker

platforms:
  - name: debian12
    image: geerlingguy/docker-debian12-ansible@sha256:3232ce7d506146b149802b561f49871dde8339fa6cb0e175c69db69530cedd47  # yamllint disable-line rule:line-length
    command: /lib/systemd/systemd
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  log: true
  options:
    vvv: true
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  inventory:
    host_vars:
      debian12:
        motd_env: "TEST"
        motd_warn: "Molecule test instance"
        motd_note: "Automated test — do not use in production"
        banner: true

verifier:
  name: ansible
