---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"
  failed_when: false

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_pkg_mgr == "apt"

- name: Install figlet
  ansible.builtin.package:
    name: figlet
    state: present

- name: Deploy dynamic MOTD script
  ansible.builtin.template:
    src: motd.j2
    dest: /usr/local/bin/dynmotd
    mode: "0755"

- name: Enable dynamic MOTD on login
  ansible.builtin.lineinfile:
    path: /etc/profile
    line: /usr/local/bin/dynmotd
    state: present

- name: Install openssh-server for banner support
  ansible.builtin.package:
    name: openssh-server
    state: present
  when: banner | bool

- name: Deploy SSH pre-auth banner
  ansible.builtin.template:
    src: dynbanner.j2
    dest: /etc/ssh/banner
    mode: "0644"
  when: banner | bool
  notify: Restart ssh

- name: Configure sshd to display banner
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Banner'
    line: 'Banner /etc/ssh/banner'
    validate: /usr/sbin/sshd -t -f %s
  when: banner | bool
  notify: Restart ssh
